; WW.CX SIP interconnect staging template.
; DO NOT include this file in a live Asterisk configuration until reviewed in
; FreePBX and tested during an approved maintenance window.
;
; Design goal: Kamailio may reach Asterisk only through loopback. Existing
; transports, trunks, endpoints, registrations, and routes remain unchanged.

[wwcx-interconnect-transport]
type=transport
protocol=udp
bind=127.0.0.1:5070
allow_reload=yes

[wwcx-interconnect-endpoint]
type=endpoint
transport=wwcx-interconnect-transport
context=from-wwcx-interconnect
allow=!all,ulaw,alaw,g722
media_encryption=no
direct_media=no
disable_direct_media_on_nat=yes
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
trust_id_inbound=no
send_pai=no
send_rpid=no
allow_subscribe=no

[wwcx-interconnect-identify]
type=identify
endpoint=wwcx-interconnect-endpoint
match=127.0.0.1/32

; No auth or registration object is defined. Source identity is constrained to
; loopback because Kamailio is the only permitted sender in the initial design.
