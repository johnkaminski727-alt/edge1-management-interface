; WW.CX SIP interconnect staging dialplan.
; DO NOT include in production without FreePBX review and explicit approval.
;
; The context deliberately has no general PSTN route and no extension pattern
; that can fall through into existing FreePBX outbound routing.

[from-wwcx-interconnect]
; Health-check target only.
exten => s,1,NoOp(WW.CX interconnect health check)
 same => n,Hangup(16)

; Reserved test identity. Replace only with an explicitly approved destination.
exten => 999001,1,NoOp(WW.CX interconnect staging test called=${EXTEN})
 same => n,Answer()
 same => n,Playback(demo-congrats)
 same => n,Hangup()

; Refuse everything else. Never use Goto(from-internal,...) here.
exten => _X!,1,NoOp(Rejected unapproved interconnect destination called=${EXTEN})
 same => n,Hangup(21)

exten => i,1,Hangup(28)
exten => t,1,Hangup(18)
