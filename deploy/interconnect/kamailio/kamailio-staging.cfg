#!KAMAILIO
# WW.CX staging template. Do not deploy unchanged.
# This configuration binds only to loopback and intentionally refuses public
# registration and relay. Production addresses, certificates, peer ACLs, and
# the Asterisk backend require operator-reviewed substitution.

debug=2
log_stderror=no
fork=yes
children=4
disable_tcp=no
enable_tls=yes

listen=tls:127.0.0.1:5061
alias=ww.cx
alias=interconnect.ww.cx

loadmodule "sl.so"
loadmodule "tm.so"
loadmodule "rr.so"
loadmodule "pv.so"
loadmodule "xlog.so"
loadmodule "maxfwd.so"
loadmodule "sanity.so"
loadmodule "textops.so"
loadmodule "siputils.so"
loadmodule "tls.so"
loadmodule "pike.so"
loadmodule "htable.so"

modparam("tls", "config", "/etc/kamailio/wwcx-tls-staging.cfg")
modparam("pike", "sampling_time_unit", 2)
modparam("pike", "reqs_density_per_unit", 16)
modparam("pike", "remove_latency", 4)

request_route {
    if (!mf_process_maxfwd_header("10")) {
        sl_send_reply("483", "Too Many Hops");
        exit;
    }

    if (!sanity_check("17895", "7")) {
        xlog("L_WARN", "Rejected malformed SIP from $si:$sp call-id=$ci\n");
        exit;
    }

    if (pike_check_req()) {
        xlog("L_WARN", "Rate limit triggered for $si:$sp\n");
        sl_send_reply("429", "Too Many Requests");
        exit;
    }

    if ($proto != "tls") {
        sl_send_reply("403", "TLS Required");
        exit;
    }

    if (is_method("REGISTER")) {
        sl_send_reply("403", "Public Registration Disabled");
        exit;
    }

    if (!is_method("OPTIONS|INVITE|ACK|BYE|CANCEL|UPDATE|PRACK|INFO")) {
        sl_send_reply("405", "Method Not Allowed");
        exit;
    }

    if (!is_myself("$rd")) {
        xlog("L_WARN", "Open relay attempt from $si:$sp to $ru\n");
        sl_send_reply("403", "Relay Forbidden");
        exit;
    }

    if (is_method("OPTIONS") && uri==myself && $rU == $null) {
        sl_send_reply("200", "WW.CX Interconnect Staging");
        exit;
    }

    # Staging gate: calls are refused until a reviewed peer ACL and dedicated
    # loopback Asterisk backend are installed.
    xlog("L_INFO", "Staging refusal method=$rm source=$si:$sp ruri=$ru call-id=$ci\n");
    sl_send_reply("503", "Interconnect Not Yet Activated");
    exit;
}
