<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WW.CX Mining Operations</title>
<style>
:root{color-scheme:dark;--bg:#071018;--panel:#0d1a24;--line:#263746;--text:#edf5fa;--muted:#9cb0bf;--green:#2fd071;--amber:#f0ad32;--red:#ed5454;--grey:#7f8d98}*{box-sizing:border-box}body{margin:0;background:linear-gradient(145deg,#071018,#0a141d 55%,#071018);color:var(--text);font:15px/1.5 system-ui,-apple-system,Segoe UI,sans-serif}main{max-width:1240px;margin:auto;padding:32px 20px 60px}header{display:flex;justify-content:space-between;gap:20px;align-items:end;margin-bottom:24px}h1{margin:0;font-size:clamp(1.7rem,4vw,2.8rem)}.eyebrow,.muted{color:var(--muted)}.eyebrow{text-transform:uppercase;letter-spacing:.14em;font-size:.75rem}.panel{background:rgba(13,26,36,.94);border:1px solid var(--line);border-radius:18px;box-shadow:0 16px 45px #0005}.overall{padding:24px;display:grid;grid-template-columns:auto 1fr;gap:20px;align-items:center}.lamp{width:72px;height:72px;border-radius:50%;background:var(--grey);box-shadow:0 0 28px color-mix(in srgb,var(--grey),transparent 35%)}.state-green{--state:var(--green)}.state-amber{--state:var(--amber)}.state-red{--state:var(--red)}.state-grey{--state:var(--grey)}.state-green .lamp,.state-amber .lamp,.state-red .lamp,.state-grey .lamp{background:var(--state);box-shadow:0 0 30px color-mix(in srgb,var(--state),transparent 35%)}.overall h2{margin:0 0 4px}.summary{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin:18px 0}.metric{padding:16px}.metric strong{display:block;font-size:1.45rem}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(310px,1fr));gap:16px}.miner{overflow:hidden}.miner-head{padding:18px;display:flex;gap:14px;align-items:center;border-bottom:1px solid var(--line)}.mini-lamp{width:18px;height:18px;border-radius:50%;background:var(--state,var(--grey));box-shadow:0 0 14px color-mix(in srgb,var(--state,var(--grey)),transparent 30%)}.miner h3{margin:0}.badge{margin-left:auto;border:1px solid color-mix(in srgb,var(--state,var(--grey)),#fff 12%);color:var(--state,var(--grey));padding:3px 9px;border-radius:999px;text-transform:uppercase;font-size:.7rem;font-weight:700;letter-spacing:.08em}.miner-body{padding:18px}.facts{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 0}.fact{background:#08131b;border:1px solid #1e303d;border-radius:12px;padding:11px}.fact span{display:block;color:var(--muted);font-size:.75rem}.fact strong{display:block;margin-top:3px}details{border-top:1px solid var(--line);padding:14px 18px}summary{cursor:pointer;font-weight:650}.details-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;color:var(--muted)}.rules{margin-top:18px;padding:20px}.rules dl{display:grid;grid-template-columns:auto 1fr;gap:8px 14px}.rules dt{font-weight:750;text-transform:uppercase}.error{padding:30px;text-align:center}.updated{text-align:right}@media(max-width:760px){header{display:block}.updated{text-align:left;margin-top:8px}.summary{grid-template-columns:repeat(2,1fr)}.overall{grid-template-columns:1fr}.lamp{width:52px;height:52px}.details-grid{grid-template-columns:1fr}}
</style>
</head>
<body><main>
<header><div><div class="eyebrow">WW.CX infrastructure</div><h1>Mining Operations</h1><div class="muted">Fleet health, telemetry freshness, pool connectivity and hashrate performance.</div></div><div class="updated" id="updated">Loading status…</div></header>
<section class="panel overall state-grey" id="overall"><div class="lamp" aria-hidden="true"></div><div><div class="eyebrow">Overall operations status</div><h2 id="overallTitle">Loading</h2><div class="muted" id="overallSummary">Retrieving the current mining operations document.</div></div></section>
<section class="summary" id="summary"></section>
<section class="grid" id="miners"></section>
<section class="panel rules"><h2>Health rules</h2><dl id="rules"></dl></section>
</main><script>
const endpoint='/edge1-status/mining-operations.json';
const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const hash=v=>{v=Number(v||0);for(const [n,u] of [[1e12,'TH/s'],[1e9,'GH/s'],[1e6,'MH/s'],[1e3,'kH/s']])if(v>=n)return `${(v/n).toFixed(2)} ${u}`;return `${v.toFixed(2)} H/s`};
const age=v=>v==null?'Unknown':v<60?`${v}s`:v<3600?`${Math.floor(v/60)}m ${v%60}s`:`${Math.floor(v/3600)}h ${Math.floor(v%3600/60)}m`;
function metric(label,value){return `<div class="panel metric"><span class="muted">${esc(label)}</span><strong>${esc(value)}</strong></div>`}
function card(m){const t=m.telemetry,p=m.pool,o=m.operations,h=m.health;return `<article class="panel miner state-${esc(h.state)}"><div class="miner-head"><div class="mini-lamp"></div><div><h3>${esc(m.name)}</h3><div class="muted">${esc(m.site)} · ${esc(m.model)}</div></div><div class="badge">${esc(h.state)}</div></div><div class="miner-body"><strong>${esc(h.summary)}</strong><div class="muted">${esc(h.code)}</div><div class="facts"><div class="fact"><span>Current hashrate</span><strong>${hash(t.hashrate_hs)}</strong></div><div class="fact"><span>Expected hashrate</span><strong>${hash(t.expected_hashrate_hs)}</strong></div><div class="fact"><span>Telemetry age</span><strong>${age(t.age_seconds)}</strong></div><div class="fact"><span>Pool</span><strong>${p.connected?'Connected':'Disconnected'}</strong></div></div></div><details><summary>Operational details</summary><div class="details-grid"><span>Miner ID</span><strong>${esc(m.id)}</strong><span>Algorithm</span><strong>${esc(m.algorithm)}</strong><span>Worker</span><strong>${esc(p.worker)}</strong><span>Pool</span><strong>${esc(p.name)}</strong><span>Temperature</span><strong>${esc(t.temperature_c)} °C</strong><span>Fan</span><strong>${esc(t.fan_rpm)} RPM</strong><span>Power</span><strong>${esc(t.power_watts)} W</strong><span>Shares</span><strong>${esc(t.accepted_shares)} accepted / ${esc(t.rejected_shares)} rejected</strong><span>Location</span><strong>${esc(o.location)}</strong><span>Owner</span><strong>${esc(o.owner)}</strong><span>Notes</span><strong>${esc(o.notes||'None')}</strong></div>${h.details?.length?`<p class="muted">${h.details.map(esc).join('<br>')}</p>`:''}</details></article>`}
async function load(){try{const r=await fetch(endpoint,{cache:'no-store'});if(!r.ok)throw new Error(`HTTP ${r.status}`);const d=await r.json();const state=d.overall.state;document.getElementById('overall').className=`panel overall state-${state}`;document.getElementById('overallTitle').textContent=d.overall.summary;document.getElementById('overallSummary').textContent=(d.overall.details||[]).join(' ');document.getElementById('updated').textContent=`Updated ${new Date(d.generated_at).toLocaleString()}`;document.getElementById('summary').innerHTML=[metric('Configured',d.summary.configured),metric('Active',d.summary.active),metric('Green',d.summary.green),metric('Amber',d.summary.amber),metric('Red',d.summary.red),metric('Fleet hashrate',hash(d.summary.total_hashrate_hs))].join('');document.getElementById('miners').innerHTML=d.miners.length?d.miners.map(card).join(''):'<div class="panel error">No miners are registered.</div>';document.getElementById('rules').innerHTML=Object.entries(d.health_rules).map(([k,v])=>`<dt class="state-${esc(k)}" style="color:var(--state)">${esc(k)}</dt><dd>${esc(v)}</dd>`).join('')}catch(e){document.getElementById('overallTitle').textContent='Status unavailable';document.getElementById('overallSummary').textContent=`Unable to load ${endpoint}: ${e.message}`}}
load();setInterval(load,60000);
</script></body></html>
