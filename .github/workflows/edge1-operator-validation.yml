name: Edge1 Operator Validation

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-edge1-operator:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Validate installer shell syntax
        run: sh -n deploy/edge1-operator/install-systemd-service.sh

      - name: Compile Edge1 Operator modules
        run: python3 -m compileall -q server

      - name: Validate Edge1 Operator import path
        run: python3 -c "import server.edge1_operator_entrypoint"
