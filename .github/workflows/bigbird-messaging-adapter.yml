name: BigBird Messaging Adapter

on:
  pull_request:
    paths:
      - "integrations/bigbird-messaging/**"
      - "integrations/bigbird_messaging/**"
      - ".github/workflows/bigbird-messaging-adapter.yml"
  push:
    branches: [main]
    paths:
      - "integrations/bigbird-messaging/**"
      - "integrations/bigbird_messaging/**"
      - ".github/workflows/bigbird-messaging-adapter.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test dependency
        run: python -m pip install pytest
      - name: Run HTTP client tests
        run: python -m unittest discover -s integrations/bigbird-messaging/tests -v
      - name: Run tool facade tests
        run: python -m pytest -q integrations/bigbird_messaging/test_tools.py
      - name: Compile adapter
        run: python -m compileall -q integrations/bigbird_messaging
      - name: Validate tool manifest
        run: python -m json.tool integrations/bigbird-messaging/tool-manifest.json >/dev/null
      - name: Validate management contract
        run: python -m json.tool integrations/bigbird-messaging/contract/management-api-v1.json >/dev/null
      - name: Verify safe default
        run: grep -qx 'WWCX_MESSAGING_CONTROL_ENABLED=false' integrations/bigbird-messaging/config/bigbird-messaging.env.example
